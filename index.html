<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Khmer New Year - Lottery Board</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 24px;
}
.header { text-align: center; margin-bottom: 24px; }
.title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.02em; }
.subtitle { font-size: 1rem; color: #94a3b8; margin-bottom: 12px; }
.subtitle .pct { color: #60a5fa; font-weight: 600; margin-left: 16px; }
.progress-bar {
  max-width: 400px; margin: 0 auto; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.1); overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px; background: #3b82f6; transition: width 0.5s;
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; max-width: 1200px; margin: 0 auto;
}
.card {
  background: rgba(255,255,255,0.05); border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
}
.card-head {
  padding: 12px 16px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}
.card-head .tier { font-weight: 700; font-size: 1.1rem; flex: 1; }
.card-head .price { color: #fbbf24; font-weight: 600; font-size: 0.9rem; }
.card-head .count { color: #94a3b8; font-size: 0.85rem; }
.card-body { padding: 8px 16px 12px; min-height: 40px; }
.winner {
  display: flex; justify-content: space-between; padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem;
}
.winner .serial { color: #94a3b8; font-family: monospace; font-size: 0.85rem; }
.winner .eid { color: #34d399; font-weight: 600; font-family: monospace; }
.empty { color: rgba(255,255,255,0.2); text-align: center; padding: 8px; }
.footer {
  text-align: center; margin-top: 24px; color: #475569; font-size: 0.8rem;
}
.search-box {
  display: block; max-width: 400px; margin: 0 auto 20px; width: 100%;
  padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05); color: #fff; font-size: 16px;
  outline: none;
}
.search-box::placeholder { color: #64748b; }
.search-box:focus { border-color: #3b82f6; }
.winner.highlight { background: rgba(52,211,153,0.15); border-radius: 4px; }
.not-found {
  text-align: center; padding: 16px; color: #ef4444; font-size: 1.1rem;
  display: none;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="title" id="eventName"></h1>
  <div class="subtitle">
    <span id="eventDate"></span>
    <span class="pct" id="progress"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<input type="text" class="search-box" id="search" placeholder="Search Employee ID...">
<div class="not-found" id="notFound">Not found</div>
<div class="grid" id="grid"></div>
<div class="footer">
  Generated: 2026/4/11 上午4:02:01
  &nbsp;·&nbsp; SHEICO Lottery System
</div>
<script>
const D = {"eventName":"2026 Khmer New Year","eventDate":"2026-04-11T00:00:00.000Z","prizeGroups":[{"tier":"頭獎","name":"CASH $1000","price":1000,"qty":1,"awarded":0,"winners":[]},{"tier":"貳獎","name":"CASH $600","price":600,"qty":2,"awarded":0,"winners":[]},{"tier":"參獎","name":"CASH $400","price":400,"qty":3,"awarded":0,"winners":[]},{"tier":"肆獎","name":"CASH $300","price":300,"qty":4,"awarded":0,"winners":[]},{"tier":"伍獎","name":"CASH $200","price":200,"qty":5,"awarded":0,"winners":[]},{"tier":"陸獎","name":"CASH $175","price":175,"qty":8,"awarded":0,"winners":[]},{"tier":"柒獎","name":"CASH $150","price":150,"qty":10,"awarded":0,"winners":[]},{"tier":"捌獎","name":"CASH $100","price":100,"qty":15,"awarded":0,"winners":[]},{"tier":"玖獎","name":"CASH $50","price":50,"qty":35,"awarded":0,"winners":[]},{"tier":"拾獎","name":"CASH $25","price":25,"qty":70,"awarded":0,"winners":[]}],"totalItems":153,"totalAwarded":0,"pct":0};
document.getElementById('eventName').textContent = D.eventName;
document.getElementById('eventDate').textContent = D.eventDate.split('T')[0];
document.getElementById('progress').textContent = D.totalAwarded + '/' + D.totalItems + ' (' + D.pct + '%)';
document.getElementById('progressFill').style.width = D.pct + '%';

function render(q) {
  const grid = document.getElementById('grid');
  const nf = document.getElementById('notFound');
  let html = '';
  let found = !q;

  D.prizeGroups.forEach(g => {
    const winners = g.winners.map(w => {
      const hl = q && w.employeeId === q;
      if (hl) found = true;
      return '<div class="winner' + (hl ? ' highlight' : '') + '">'
        + '<span class="serial">' + w.serialNo + '</span>'
        + '<span class="eid">' + w.employeeId + '</span></div>';
    }).join('');

    html += '<div class="card"><div class="card-head">'
      + '<span class="tier">' + g.tier + '</span>'
      + '<span class="price">$' + g.price.toLocaleString() + '</span>'
      + '<span class="count">' + g.awarded + '/' + g.qty + '</span>'
      + '</div><div class="card-body">'
      + (winners || '<div class="empty">-</div>')
      + '</div></div>';
  });

  grid.innerHTML = html;
  nf.style.display = (q && !found) ? 'block' : 'none';
}

render();
document.getElementById('search').addEventListener('input', e => render(e.target.value.trim()));
</script>
</body>
</html>
